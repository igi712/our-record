<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0, viewport-fit=cover">
    <title>Our Record - Quotes</title>
    <link rel="stylesheet" href="assets/magica/css/shared.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Open+Sans:wght@600;700&display=swap');

        body {
            margin: 0;
            overflow: hidden;
            background-color: #000000;
        }

        #app {
            position: relative;
            width: 100vw;
            height: 100vh;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        /* Connecting / preloader UI */
        .connecting {
            cursor: progress !important;
        }

        #loading {
            display: none;
            position: absolute;
            width: 334px;
            height: 54px;
            background: url('assets/connecting.png') right bottom no-repeat;
            z-index: 40;
            pointer-events: none;
        }

        .connecting #loading {
            display: block;
        }

        /* Position relative to a centered 16:9 frame (landscape) */
        #loading {
            right: calc((100vw - min(100vw, calc(100vh * 16 / 9))) / 2 + env(safe-area-inset-right, 0px));
            bottom: 20px;
        }

        @media (max-width:520px) {
            #loading {
                right: calc((100vw - min(100vw, calc(100vh * 16 / 9))) / 2 + env(safe-area-inset-right, 12px));
                bottom: 14px;
                width: 260px;
                height: 44px;
                background-size: contain;
            }
        }

        @media (orientation: portrait) {
            #loading {
                right: calc((100vw - min(100vw, calc(100vh * 16 / 9))) / 2 + env(safe-area-inset-right, 0px));
            }
        }

        #subtitle {
            position: absolute;
            z-index: 20;
            left: 0;
            right: 0;
            bottom: clamp(20px, 5.5vh, 58px);
            margin: 0 auto;
            padding: 0 24px;
            max-width: min(72vw, 820px);
            color: #fff;
            font: 700 clamp(18px, 2.3vw, 32px)/1.15 'Open Sans', sans-serif;
            text-align: center;
            white-space: pre-line;
            text-shadow: -2px -2px 0 #4d4a46, 2px -2px 0 #4d4a46, -2px 2px 0 #4d4a46, 2px 2px 0 #4d4a46, 0 3px 5px rgba(0, 0, 0, .65);
            pointer-events: none;
        }
    </style>

    <script src="lib/live2dcubismcore.min.js"></script>
    <script src="lib/live2d.min.js"></script>
    <script src="lib/pixi.min.js"></script>
    <script src="lib/pixi-live2d-display-index.min.js"></script>
    <script src="pixi-patches.js"></script>
</head>

<body>
    <div id="app">
        <canvas id="canvas"></canvas>
        <div id="loading" aria-hidden="true"></div>
        <div id="subtitle" aria-live="polite" hidden></div>
    </div>

    <!-- Config MUST be set before viewer.js loads -->
    <script>window.__QUOTES_CONFIG = { viewMode: 'home16', noGameBg: true, xOffset: -260 };</script>

    <script src="viewer.js"></script>
    <script src="live2d.js"></script>
    <script type="module" src="quotes-main.js"></script>
</body>

</html>
