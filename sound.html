<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>MR Sound Mode</title>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/magica/css/shared.css">
    <style>
        body {
            font-family: 'Open Sans', system-ui, -apple-system, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #050508;
            color: #4a3c31;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        #bgCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
            pointer-events: none;
        }

        #app {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 1024px;
            height: 576px;
            transform-origin: center center;
            z-index: 1;
            box-sizing: border-box;
        }

        .top-bar {
            position: absolute;
            top: 10px;
            left: 0;
            width: 1024px;
            height: 43px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 85px;
            box-sizing: border-box;
            z-index: 10;
        }

        #backBtn {
            display: block;
            width: 89px;
            height: 43px;
            background: url("assets/magica/resource/image_web/common/global/global_back.png") no-repeat;
            background-size: contain;
            cursor: pointer;
            transition: filter 0.1s ease;
            text-indent: -9999px;
        }

        #backBtn:hover {
            filter: brightness(1.1);
        }

        #backBtn:active {
            filter: brightness(0.9);
        }

        .page-title {
            color: #ffffff;
            font-size: 20px;
            font-weight: 600;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
            letter-spacing: 1px;
            margin-right: 40px;
        }

        /* Status Label */
        #status {
            position: absolute;
            top: 9px;
            right: 20px;
            height: 24px;
            line-height: 22px;
            background: rgba(0, 0, 0, 0.4);
            color: #ffffff;
            font-size: 11px;
            padding: 0 12px;
            border-radius: 12px;
            border: 1px solid rgba(198, 168, 130, 0.6);
            z-index: 3;
            max-width: 300px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            box-sizing: border-box;
        }

        /* List Main Container (Positioned directly below pink header - no gap) */
        .listMain {
            width: 600px;
            height: calc(100% - 50px);
            position: absolute;
            top: 36px;
            left: 5px;
            box-sizing: border-box;
            z-index: 1;
        }

        #bgmList {
            list-style: none;
            padding: 10px 0;
            margin: 0;
            height: 100%;
            overflow-y: auto;
            box-sizing: border-box;
        }

        /* Custom scrollbar */
        #bgmList::-webkit-scrollbar {
            width: 8px;
        }

        #bgmList::-webkit-scrollbar-track {
            background: rgba(198, 168, 130, 0.15);
            border-radius: 4px;
        }

        #bgmList::-webkit-scrollbar-thumb {
            background: #c6a882;
            border-radius: 4px;
        }

        #bgmList::-webkit-scrollbar-thumb:hover {
            background: #b07422;
        }

        /* BGM card sizing (overrides base commonFrame3 from shared.css) */
        #bgmList .commonFrame3 {
            width: calc(100% - 30px);
            height: 60px;
            margin: 0 auto 10px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 15px;
            transition: box-shadow 0.25s ease, background-color 0.25s ease;
        }

        /* Quest Card Active State Highlight */
        .commonFrame3.playing {
            box-shadow: 0 0 0 2px #ff4f92, 0 0 8px rgba(255, 79, 146, 0.4), 0 0 5px #eee9e0 inset;
            background: #fffcfd;
        }

        /* Original Story-style layout components */
        .sectionNumber {
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            width: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-top-left-radius: 4px;
            border-bottom-left-radius: 4px;
            box-sizing: border-box;
            z-index: 1;
            font-size: 13px;
            font-weight: 600;
            color: #ffffff;
            background: #bca17d;
            text-shadow: -1px -1px 0 #7d6342, 1px -1px 0 #7d6342, -1px 1px 0 #7d6342, 1px 1px 0 #7d6342;
        }

        .sectionNumber::after {
            content: "";
            position: absolute;
            right: -15px;
            top: 0;
            width: 0;
            height: 0;
            border-top: 30px solid transparent;
            border-bottom: 30px solid transparent;
            border-left: 15px solid #bca17d;
            z-index: 1;
        }

        .sectionNumber.col-brown {
            background: #bca17d;
            text-shadow: -1px -1px 0 #7d6342, 1px -1px 0 #7d6342, -1px 1px 0 #7d6342, 1px 1px 0 #7d6342;
        }
        .sectionNumber.col-brown::after {
            border-left-color: #bca17d;
        }

        .sectionNumber.col-yellow {
            background: #eebc29;
            text-shadow: -1px -1px 0 #a67707, 1px -1px 0 #a67707, -1px 1px 0 #a67707, 1px 1px 0 #a67707;
        }
        .sectionNumber.col-yellow::after {
            border-left-color: #eebc29;
        }

        .sectionNumber.col-purple {
            background: #493b82;
            text-shadow: -1px -1px 0 #281e54, 1px -1px 0 #281e54, -1px 1px 0 #281e54, 1px 1px 0 #281e54;
        }
        .sectionNumber.col-purple::after {
            border-left-color: #493b82;
        }

        .sectionNumber.col-blue {
            background: #3976af;
            text-shadow: -1px -1px 0 #1b4973, 1px -1px 0 #1b4973, -1px 1px 0 #1b4973, 1px 1px 0 #1b4973;
        }
        .sectionNumber.col-blue::after {
            border-left-color: #3976af;
        }

        .sectionTitle {
            flex-grow: 1;
            margin-left: 145px;
            margin-right: 15px;
            font-size: 15px;
            color: #4a3c31;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            text-align: left;
        }
    </style>
    <script src="lib/pixi.min.js"></script>
</head>

<body>
    <canvas id="bgCanvas"></canvas>

    <div id="app">
        <!-- Top Bar -->
        <div class="top-bar">
            <a href="index.html" id="backBtn">Back</a>
            <div class="page-title">SOUND ARCHIVE</div>
        </div>

        <!-- Story Archive Main View -->
        <div id="StoryCollection">
            <!-- Left Side Categories -->
            <div id="tabBtn" class="commonFrame2">
                <ul class="common_tab t_gold">
                    <li class="btn se_tabs current"><span>Game BGM</span></li>
                </ul>
            </div>

            <!-- Right Side Song List -->
            <div id="listWrap" class="commonFrame1 main">
                <h2 id="listTitle">BGM List</h2>
                <div id="status">Loading...</div>
                <div class="listMain">
                    <ul id="bgmList"></ul>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { loadCocosStudioAssets, CocosStudioArmature } from './lib/cocos-to-pixi.js';

        // Setup background canvas
        const WORLD_W = 1024;
        const WORLD_H = 768;

        const bgApp = new PIXI.Application({
            width: window.innerWidth,
            height: window.innerHeight,
            view: document.getElementById('bgCanvas'),
            backgroundColor: 0x050508,
            antialias: true
        });

        let bgArmature = null;

        function resizeBg() {
            const w = window.innerWidth;
            const h = window.innerHeight;
            bgApp.renderer.resize(w, h);

            if (bgArmature) {
                const scale = Math.max(w / WORLD_W, h / WORLD_H);
                bgArmature.scale.set(scale);
                bgArmature.x = w / 2;
                bgArmature.y = h / 2;
            }

            // Scale and center the BGM player container #app based on 1024x576 aspect ratio
            const app = document.getElementById('app');
            if (app) {
                const scale = Math.min(w / 1024, h / 576);
                app.style.transform = `translate(-50%, -50%) scale(${scale})`;
            }
        }
        window.addEventListener('resize', resizeBg);

        async function initBackground() {
            try {
                const assets = await loadCocosStudioAssets('bg/web/web_0015.ExportJson');
                bgArmature = new CocosStudioArmature(assets.json, assets.textures);

                bgApp.stage.addChild(bgArmature);

                resizeBg();
                bgArmature.play('action', true);

                bgApp.ticker.add((delta) => {
                    bgArmature.update(delta / 60);
                });
            } catch (err) {
                console.error('[CocosStudioPlayer] Background failed:', err);
            }
        }

        initBackground();

        // Audio Decoding & Worker setup
        const HCA_JS_URL = new URL("./lib/hca.js", document.baseURI);
        const KEY1 = 0x01395C51;
        const KEY2 = 0x00000000;

        const statusEl = document.getElementById("status");
        const listEl = document.getElementById("bgmList");

        let hcaModule;
        let hcaBlobUrl;
        let worker;
        let player;

        // Resolved BGM assets base (local or remote)
        let _bgmBase = null;
        let _bgmBaseSource = null;

        async function resolveBgmBase() {
            if (_bgmBase) { console.info('[MR-BGM] assets base (cached):', _bgmBase, 'source:', _bgmBaseSource); return _bgmBase; }

            // 1) Override: window.MR_BGM_BASE, localStorage mrBgmBase, ?bgmBase= query param
            try {
                if (window.MR_BGM_BASE) {
                    _bgmBase = String(window.MR_BGM_BASE).replace(/\/$/, '');
                    _bgmBaseSource = 'window.MR_BGM_BASE';
                    console.info('[MR-BGM] assets base resolved (override):', _bgmBase, 'source:', _bgmBaseSource);
                    return _bgmBase;
                }
            } catch (e) { }
            try {
                const v = localStorage.getItem('mrBgmBase');
                if (v) {
                    _bgmBase = String(v).replace(/\/$/, '');
                    _bgmBaseSource = 'localStorage mrBgmBase';
                    console.info('[MR-BGM] assets base resolved (override):', _bgmBase, 'source:', _bgmBaseSource);
                    return _bgmBase;
                }
            } catch (e) { }
            try {
                const params = new URLSearchParams(window.location.search);
                if (params.has('bgmBase')) {
                    _bgmBase = params.get('bgmBase').replace(/\/$/, '');
                    _bgmBaseSource = 'query param bgmBase';
                    console.info('[MR-BGM] assets base resolved (override):', _bgmBase, 'source:', _bgmBaseSource);
                    return _bgmBase;
                }
            } catch (e) { }

            // 2) Local probe — try fetching the BGM list JSON from the local path
            const localBase = './assets/ma-re-data/resource/sound_native/bgm';
            try {
                const probeUrl = `${localBase}/magireco-bgm.json`;
                console.debug('[MR-BGM] probing local assets at', probeUrl);
                const controller = new AbortController();
                const timer = setTimeout(() => controller.abort(), 2000);
                const resp = await fetch(probeUrl, { method: 'GET', cache: 'no-store', signal: controller.signal });
                clearTimeout(timer);
                if (resp && resp.ok) {
                    _bgmBase = localBase;
                    _bgmBaseSource = 'local (probe)';
                    console.info('[MR-BGM] assets base resolved (local probe):', _bgmBase);
                    return _bgmBase;
                }
                console.debug('[MR-BGM] local probe HTTP result', resp && resp.status);
            } catch (e) {
                console.debug('[MR-BGM] local probe failed:', e && (e.message || e.name) ? (e.message || e.name) : e);
            }

            // 3) Remote fallback (GitHub raw — works on GitHub Pages)
            _bgmBase = 'https://raw.githubusercontent.com/igi712/ma-re-data/main/resource/sound_native/bgm';
            _bgmBaseSource = 'default remote';
            console.info('[MR-BGM] assets base resolved (default remote):', _bgmBase);
            return _bgmBase;
        }

        function setStatus(text) {
            statusEl.textContent = text;
        }

        async function initWorker() {
            if (worker) return worker;

            if (!hcaBlobUrl) {
                const response = await fetch(HCA_JS_URL.href);
                const blob = new Blob([await response.arrayBuffer()], { type: "text/javascript" });
                hcaBlobUrl = URL.createObjectURL(blob);
            }

            if (!hcaModule) {
                hcaModule = await import(hcaBlobUrl);
            }

            worker = await hcaModule.HCAWorker.create(hcaBlobUrl);
            return worker;
        }

        async function playTrack(fileName, desc) {
            try {
                setStatus(`Loading ${fileName}...`);
                const activeWorker = await initWorker();
                await resolveBgmBase(); // Ensure base is resolved

                const fileResponse = await fetch(`${_bgmBase}/${fileName}`);
                if (!fileResponse.ok) {
                    throw new Error(`Failed to load ${fileName}: ${fileResponse.status} ${fileResponse.statusText}`);
                }

                const hcaData = new Uint8Array(await fileResponse.arrayBuffer());
                const decrypted = await activeWorker.decrypt(hcaData, KEY1, KEY2);
                const newPlayer = await hcaModule.HCAWebAudioLoopPlayer.create(decrypted, activeWorker);

                if (player) {
                    await player.stop();
                }
                player = newPlayer;
                player.playInBackground = true;
                player.play();

                setStatus(`Now playing: ${fileName}${desc ? ` — ${desc}` : ""}`);
            } catch (error) {
                console.error(error);
                setStatus(`Error: ${error.message || error}`);
            }
        }

        let activeItemEl = null;

        function createTrackButton(entry, idx) {
            const item = document.createElement("li");
            item.className = "commonFrame3";

            const fileName = entry.filename;
            const desc = entry.desc ? entry.desc.trim() : "";
            
            // Remove the .hca extension for the badge
            const badgeText = fileName.replace(/\.hca$/i, '');

            const colors = ["col-brown", "col-yellow", "col-purple", "col-blue"];
            const colorClass = colors[idx % colors.length];

            const badge = document.createElement("div");
            badge.className = `sectionNumber ${colorClass}`;
            badge.textContent = badgeText;
            item.appendChild(badge);

            const descEl = document.createElement("div");
            descEl.className = "sectionTitle";
            descEl.textContent = desc || fileName;
            item.appendChild(descEl);

            const button = document.createElement("button");
            button.className = "sb_gold_01";
            button.textContent = "Playback";
            button.addEventListener("click", () => {
                if (activeItemEl) {
                    activeItemEl.classList.remove("playing");
                    const prevBtn = activeItemEl.querySelector(".sb_gold_01");
                    if (prevBtn) prevBtn.textContent = "Playback";
                }
                item.classList.add("playing");
                button.textContent = "Playing";
                activeItemEl = item;

                playTrack(fileName, desc);
            });

            item.appendChild(button);
            return item;
        }

        async function loadList() {
            setStatus("Loading BGM list...");
            const base = await resolveBgmBase();
            const listUrl = `${base}/magireco-bgm.json`;
            const response = await fetch(listUrl);
            if (!response.ok) {
                throw new Error(`Failed to load BGM list: ${response.status} ${response.statusText}`);
            }

            const groups = await response.json();
            const entries = groups
                .flatMap((group) => Array.isArray(group.entries) ? group.entries : [])
                .filter((entry) => typeof entry.filename === "string" && entry.filename.endsWith(".hca"));

            listEl.innerHTML = "";
            entries.forEach((entry, idx) => {
                listEl.appendChild(createTrackButton(entry, idx));
            });

            const sourceLabel = _bgmBaseSource ? ` (${_bgmBaseSource})` : '';
            setStatus(`Loaded ${entries.length} tracks${sourceLabel}. Click one to play.`);
            
            // Initial call to scale the app properly right after list is ready
            resizeBg();
        }

        loadList().catch((error) => {
            console.error(error);
            setStatus(`Error: ${error.message || error}`);
        });

        // Trigger an initial resize layout sizing
        resizeBg();
    </script>
</body>

</html>
